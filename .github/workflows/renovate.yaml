name: Renovate
on:
  schedule:
    - cron: '42 * * * *' # once per hour
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      # token setup details at https://docs.renovatebot.com/modules/platform/github/#running-as-a-github-app
      - name: Get token
        id: get_token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2
        with:
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          owner: ${{ github.repository_owner }}
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@b11417b9eaac3145fe9a8544cee66503724e32b6 # v43.0.8
        env:
          # use commit signing via GitHub API
          RENOVATE_PLATFORM_COMMIT: 'true'
        with:
          token: '${{ steps.get_token.outputs.token }}'
          configurationFile: renovate.json5